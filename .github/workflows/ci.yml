name: Java 21 - Playwright UI + RestAssured API + Extent Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run Tests
        run: mvn clean test

      - name: Upload Extent Report + Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Extent-Test-Report
          path: |
            test-output/ExtentReport.html
            test-output/screenshots/
          retention-days: 7